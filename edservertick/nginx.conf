server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Static site
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-cache the immutable-ish static assets
    location ~* \.(css|js|woff2?|png|svg|ico)$ {
        add_header Cache-Control "public, max-age=86400";
        try_files $uri =404;
    }

    # Reverse-proxy the API to the edcas-server container on the shared compose
    # network. Using a variable + Docker's embedded DNS resolver means nginx still
    # starts when `server` is briefly unavailable (it resolves per-request instead
    # of failing at boot).
    location /api/ {
        resolver 127.0.0.11 valid=30s ipv6=off;
        set $upstream server:3000;
        proxy_pass http://$upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
    }
}
