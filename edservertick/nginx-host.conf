# ─────────────────────────────────────────────────────────────────────────────
# HOST nginx vhost for edservertick.de
# Install on the server as: /etc/nginx/conf.d/edservertick.conf
#
# This is the PUBLIC reverse proxy (DNS → host nginx + TLS → container :8081).
# It is NOT the container config — that lives in edservertick/nginx.conf and is
# baked into the image, splitting static files vs /api/ → edcas-server:3000.
#
# The host just forwards everything to the tickweb container; the container
# decides what is static and what is API.
#
# Do NOT redefine the edcas_api / edcas_app upstreams or the journal_upload
# limit_req_zone here — they already exist in edcas.conf (http-context globals);
# redefining them makes `nginx -t` fail with "duplicate" errors.
# ─────────────────────────────────────────────────────────────────────────────

upstream edservertick_app {
    server 127.0.0.1:8081;
    keepalive 16;
}

# ── HTTP: ACME challenge + redirect to HTTPS ─────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name edservertick.de www.edservertick.de;

    # certbot --webroot -w /var/lib/letsencrypt  (matches the rest of this host)
    location /.well-known/acme-challenge/ {
        root /var/lib/letsencrypt;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS ────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name edservertick.de www.edservertick.de;

    ssl_certificate     /etc/letsencrypt/live/edservertick.de/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/edservertick.de/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml application/xml;
    gzip_min_length 256;

    location / {
        proxy_pass         http://edservertick_app;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_connect_timeout 5s;
        proxy_read_timeout   60s;
    }
}
