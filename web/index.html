<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EDCAS — Elite Dangerous Commander Assistant System</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%;
      height: 100%;
      background: #0a0a0a;
      overflow: hidden;
    }
    #terminal-container {
      width: 100%;
      height: 100%;
    }
    #terminal {
      width: 100%;
      height: 100%;
    }
    #loading {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #ff8c00;
      font-family: monospace;
      font-size: 16px;
    }
  </style>
</head>
<body>
  <div id="loading">Loading EDCAS…</div>
  <div id="terminal-container">
    <div id="terminal"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>
  <script type="module">
    import init, { push_key_event, on_resize } from './pkg/edcas_client.js';

    const term = new Terminal({
      fontFamily: "'Courier New', 'Lucida Console', monospace",
      fontSize: 14,
      theme: {
        background: '#000000',
        foreground: '#cccccc',
        cursor: '#ff8c00',
      },
      cursorBlink: false,
      convertEol: false,
    });

    const fitAddon = new FitAddon.FitAddon();
    term.loadAddon(fitAddon);
    term.open(document.getElementById('terminal'));
    fitAddon.fit();

    window.xterm_write = (data) => term.write(data);

    await init();

    document.getElementById('loading').style.display = 'none';

    on_resize(term.cols, term.rows);

    term.onKey(({ domEvent: e }) => {
      e.preventDefault();
      push_key_event(e.key, e.ctrlKey, e.shiftKey, e.altKey);
    });

    term.onResize(({ cols, rows }) => {
      on_resize(cols, rows);
    });

    window.addEventListener('resize', () => {
      fitAddon.fit();
    });

    term.focus();
  </script>
</body>
</html>
