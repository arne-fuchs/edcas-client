name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  # ── Linux binary + .deb ─────────────────────────────────────────────────────
  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y pkg-config libssl-dev

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build
        run: cargo build --release --bin edcas-client

      - name: Package tarball
        run: |
          mkdir -p dist
          cp target/release/edcas-client dist/
          cp settings-example.json dist/
          tar czf edcas-client-linux-x86_64.tar.gz -C dist .

      - name: Build Debian package
        run: |
          VER=${{ steps.version.outputs.version }}
          PKG="edcas-client_${VER}_amd64"
          mkdir -p "${PKG}/DEBIAN"
          mkdir -p "${PKG}/usr/bin"
          mkdir -p "${PKG}/usr/share/edcas-client"
          mkdir -p "${PKG}/usr/share/applications"
          mkdir -p "${PKG}/etc/edcas-client"

          cp target/release/edcas-client          "${PKG}/usr/bin/"
          cp settings-example.json                "${PKG}/etc/edcas-client/"
          cp assets/graphics/logo/edcas_128.png   "${PKG}/usr/share/edcas-client/"
          cp edcas.desktop                        "${PKG}/usr/share/applications/"

          sed "s/^Version: .*/Version: ${VER}/" control > "${PKG}/DEBIAN/control"

          dpkg-deb --build --root-owner-group "${PKG}"

      - uses: actions/upload-artifact@v4
        with:
          name: linux-artifacts
          path: |
            edcas-client-linux-x86_64.tar.gz
            edcas-client_*.deb

  # ── Arch package (.pkg.tar.zst) ─────────────────────────────────────────────
  package-arch:
    name: Build Arch Package
    runs-on: ubuntu-latest
    needs: build-linux
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: linux-artifacts

      - name: Extract version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Build Arch package via Docker
        run: |
          mkdir -p arch-build
          tar xzf edcas-client-linux-x86_64.tar.gz -C arch-build

          cat > arch-build/PKGBUILD << PKGEOF
          pkgname=edcas-client
          pkgver=${VERSION}
          pkgrel=1
          pkgdesc="Elite Dangerous Commander Assistant System"
          arch=('x86_64')
          url="https://github.com/arne-fuchs/edcas-client"
          license=('Apache-2.0')
          depends=('gcc-libs' 'glibc' 'openssl')
          source=("edcas-client" "settings-example.json")
          sha256sums=('SKIP' 'SKIP')

          package() {
              install -Dm755 "\${srcdir}/edcas-client"        "\${pkgdir}/usr/bin/edcas-client"
              install -Dm644 "\${srcdir}/settings-example.json" "\${pkgdir}/etc/edcas-client/settings-example.json"
          }
          PKGEOF

          docker run --rm -v "$PWD/arch-build:/pkg" archlinux:latest bash -c "
            pacman -Syu --noconfirm base-devel &&
            useradd -m builder &&
            chown -R builder /pkg &&
            su builder -c 'cd /pkg && PKGEXT=.pkg.tar.zst makepkg -f --nocheck'
          "
          cp arch-build/*.pkg.tar.zst .

      - uses: actions/upload-artifact@v4
        with:
          name: arch-artifacts
          path: "*.pkg.tar.zst"

  # ── Windows binary + .zip ────────────────────────────────────────────────────
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release --bin edcas-client

      - name: Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item target\release\edcas-client.exe dist\
          Copy-Item settings-example.json, start.bat dist\
          Compress-Archive -Path dist\* -DestinationPath edcas-client-windows-x86_64.zip

      - uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: edcas-client-windows-x86_64.zip

  # ── macOS binary + .tar.gz ───────────────────────────────────────────────────
  build-macos:
    name: Build macOS (aarch64)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          key: macos-aarch64

      - name: Build
        run: cargo build --release --bin edcas-client --target aarch64-apple-darwin

      - name: Package
        run: |
          mkdir -p dist
          cp target/aarch64-apple-darwin/release/edcas-client dist/
          cp settings-example.json dist/
          tar czf edcas-client-macos-aarch64.tar.gz -C dist .

      - uses: actions/upload-artifact@v4
        with:
          name: macos-artifacts
          path: edcas-client-macos-aarch64.tar.gz

  # ── GitHub Release ───────────────────────────────────────────────────────────
  release:
    name: Create Release
    needs: [build-linux, package-arch, build-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            edcas-client-linux-x86_64.tar.gz
            edcas-client_*.deb
            *.pkg.tar.zst
            edcas-client-windows-x86_64.zip
            edcas-client-macos-aarch64.tar.gz
